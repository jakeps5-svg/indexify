openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: inquiry
    description: Inquiry form submissions
  - name: audit
    description: SEO audit operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /inquiries:
    post:
      operationId: submitInquiry
      tags: [inquiry]
      summary: Submit an inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryInput"
      responses:
        "201":
          description: Inquiry submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /audit:
    post:
      operationId: runSeoAudit
      tags: [audit]
      summary: Run an SEO audit on a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditInput"
      responses:
        "200":
          description: SEO audit results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditResult"
        "400":
          description: Invalid URL or fetch error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    InquiryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        service:
          type: string
          enum: [seo, google-ads, both]
        message:
          type: string
          minLength: 1
      required:
        - name
        - email
        - service
        - message
    InquiryResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        whatsappUrl:
          type: string
      required:
        - id
        - message
        - whatsappUrl
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuditInput:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    AuditCheck:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pass, warn, fail]
        value:
          type: string
        description:
          type: string
      required:
        - name
        - status
        - value
        - description
    AuditSection:
      type: object
      properties:
        title:
          type: string
        score:
          type: integer
        checks:
          type: array
          items:
            $ref: "#/components/schemas/AuditCheck"
      required:
        - title
        - score
        - checks
    AuditResult:
      type: object
      properties:
        url:
          type: string
        finalUrl:
          type: string
        overallScore:
          type: integer
        loadTimeMs:
          type: integer
        pageTitle:
          type: string
        metaDescription:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/AuditSection"
        recommendations:
          type: array
          items:
            type: string
      required:
        - url
        - finalUrl
        - overallScore
        - loadTimeMs
        - pageTitle
        - metaDescription
        - sections
        - recommendations
