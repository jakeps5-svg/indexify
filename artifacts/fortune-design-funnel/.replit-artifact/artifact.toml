kind = "web"
previewPath = "/"
title = "Fortune Design – SEO & Google Ads"
version = "1.0.0"
id = "artifacts/fortune-design-funnel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21036
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fortune-design-funnel run dev"

[services.env]
PORT = "21036"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fortune-design-funnel", "run", "build"]
publicDir = "artifacts/fortune-design-funnel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
